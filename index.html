<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>酷炫个人主页</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        dark: '#0f172a',
        neon: '#7dd3fc',
        accent: '#c084fc',
      },
      fontFamily: {
        sans: ['Inter','system-ui'],
      },
    }
  }
}
</script>
<style type="text/tailwindcss">
@layer utilities {
  .text-gradient {
    @apply bg-clip-text text-transparent bg-gradient-to-r from-neon to-accent;
  }
  .glass {
    @apply bg-white/5 backdrop-blur-xl border border-white/10;
  }
  .animate-float {
    animation: float 6s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }
}
</style>
</head>
<body class="bg-dark text-gray-200 min-h-screen">
<!-- 粒子背景（轻量不卡） -->
<div id="particles" class="fixed inset-0 z-0 opacity-40"></div>

<div class="relative z-10 max-w-5xl mx-auto px-6 py-24">
  <!-- 标题区域 -->
  <div class="flex flex-col gap-6 mb-20">
    <p class="text-neon opacity-80 text-sm md:text-base tracking-widest">WELCOME TO MY WORLD</p>
    <h1 class="text-[clamp(2.5rem,8vw,5rem)] font-bold leading-tight">
      我是<span class="text-gradient">邪恶豆包</span><br/>
      <span id="typed" class="text-white"></span>
    </h1>
    <p class="text-gray-400 max-w-xl text-lg">简约 · 高级 · 氛围感 · 现代动效设计，不花一分钱也能超好看</p>
    
    <div class="flex gap-4 mt-4">
      <a href="#" class="glass px-6 py-3 rounded-full flex items-center gap-2 hover:bg-white/10 transition">
        <i class="fa fa-github"></i> 项目主页
      </a>
      <a href="#" class="bg-gradient-to-r from-neon to-accent text-dark px-6 py-3 rounded-full font-semibold hover:opacity-90 transition">
        进入主页
      </a>
    </div>
  </div>

  <!-- 卡片模块 -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <div class="glass p-6 rounded-2xl hover:scale-[1.02] transition animate-float delay-0">
      <i class="fa fa-magic text-2xl text-neon mb-4"></i>
      <h3 class="text-xl font-bold mb-2">现代设计</h3>
      <p class="text-gray-400">磨砂玻璃 + 渐变 + 流畅动画，高级感拉满</p>
    </div>
    <div class="glass p-6 rounded-2xl hover:scale-[1.02] transition animate-float delay-150">
      <i class="fa fa-bolt text-2xl text-neon mb-4"></i>
      <h3 class="text-xl font-bold mb-2">极速响应</h3>
      <p class="text-gray-400">手机电脑自适应，轻量不卡顿，GitHub 完美运行</p>
    </div>
    <div class="glass p-6 rounded-2xl hover:scale-[1.02] transition animate-float delay-300">
      <i class="fa fa-heart text-2xl text-accent mb-4"></i>
      <h3 class="text-xl font-bold mb-2">专属风格</h3>
      <p class="text-gray-400">可随意改颜色、文字、动效，完全变成你想要的样子</p>
    </div>
  </div>
</div>

<script>
// 打字机效果
const texts = ["高级氛围感","酷炫动效","极简设计","不花一分钱"]
let i = 0, j = 0, current = ''
function type() {
  if (j < texts[i].length) {
    current += texts[i][j++]
    document.getElementById('typed').innerText = current
    setTimeout(type, 120)
  } else {
    setTimeout(() => { j = 0; i = (i+1)%texts.length; current = ''; type() }, 1200)
  }
}
type()

// 轻量粒子背景
document.body.onload = ()=>{
  const p = document.getElementById('particles')
  for(let i=0;i<60;i++){
    const s = document.createElement('div')
    const size = Math.random()*4 + 1
    s.style.cssText = `
      position:absolute; left:${Math.random()*100}%; top:${Math.random()*100}%;
      width:${size}px; height:${size}px; background:white; border-radius:50%;
      opacity:${Math.random()*0.5}; animation:float ${Math.random()*6+4}s infinite;
    `
    p.appendChild(s)
  }
}
</script>
</body>
</html>
